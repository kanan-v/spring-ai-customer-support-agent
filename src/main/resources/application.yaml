spring:
  application:
    name: spring-ai-customer-support-agent
  datasource:
    url: jdbc:postgresql://localhost:5436/support-db
    username: my-user
    password: password
    driver-class-name: org.postgresql.Driver

  ai:
      ollama:
        base-url: http://localhost:11434
        chat:
          model: qwen2.5
        embedding:
          model: nomic-embed-text
      vectorstore:
        pgvector:
          initialize-schema: true
  logging:
    level:
      org.springframework.ai: DEBUG